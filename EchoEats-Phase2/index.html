<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoEats Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-screen login-screen">
        <div class="brand-title center-title">EchoEats</div>

        <div class="login-form">
            <input type="text" id="loginName" placeholder="Name">
            <input type="password" id="loginPassword" placeholder="Password">
            <button class="primary-btn" onclick="login()">Sign In</button>
        </div>

        <div class="register-box">
            <h3>Quick Register</h3>
            <input type="text" id="regName" placeholder="Name">
            <input type="password" id="regPassword" placeholder="Password">
            <button class="primary-btn" onclick="register()">Register</button>
        </div>

        <p id="message"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
